<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Left ear -->
  <polygon points="10,28 5,4 23,22" fill="#D4601A"/>
  <!-- Right ear -->
  <polygon points="54,28 59,4 41,22" fill="#D4601A"/>
  <!-- Inner left ear -->
  <polygon points="12,26 8,10 21,22" fill="#F09070"/>
  <!-- Inner right ear -->
  <polygon points="52,26 56,10 43,22" fill="#F09070"/>

  <!-- Head -->
  <ellipse cx="32" cy="32" rx="22" ry="20" fill="#D4601A"/>

  <!-- White muzzle -->
  <ellipse cx="32" cy="38" rx="13" ry="10" fill="#F5E0B0"/>

  <!-- Eyes -->
  <ellipse cx="23" cy="28" rx="4" ry="3.5" fill="white"/>
  <ellipse cx="41" cy="28" rx="4" ry="3.5" fill="white"/>
  <circle cx="24" cy="29" r="2.5" fill="#180800"/>
  <circle cx="42" cy="29" r="2.5" fill="#180800"/>
  <circle cx="25" cy="28" r="1" fill="white"/>
  <circle cx="43" cy="28" r="1" fill="white"/>

  <!-- Nose -->
  <ellipse cx="32" cy="35.5" rx="2.5" ry="2" fill="#180800"/>

  <!-- Smile -->
  <path d="M 27 40 Q 32 44 37 40" fill="none" stroke="#180800" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Open book at bottom -->
  <rect x="8" y="52" width="48" height="11" rx="2" fill="#3570B0"/>
  <rect x="29" y="52" width="6" height="11" fill="#1A4A80"/>
  <rect x="9" y="53" width="19" height="9" fill="#FEFAF0" rx="1"/>
  <rect x="36" y="53" width="19" height="9" fill="#FEFAF0" rx="1"/>
  <line x1="11" y1="56.5" x2="27" y2="56.5" stroke="#C0B080" stroke-width="0.8"/>
  <line x1="11" y1="59.5" x2="27" y2="59.5" stroke="#C0B080" stroke-width="0.8"/>
  <line x1="37" y1="56.5" x2="53" y2="56.5" stroke="#C0B080" stroke-width="0.8"/>
  <line x1="37" y1="59.5" x2="53" y2="59.5" stroke="#C0B080" stroke-width="0.8"/>
</svg>
