name: Build Docs
description: Install dependencies, build HTML docs, and upload artifact

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: '3.x'
    - name: Install Poetry
      shell: bash
      run: pip install poetry
    - name: Build HTML
      shell: bash
      run: ./build_docs.sh --no-browser
    - name: Upload artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
      with:
        name: html-docs
        path: docs/build/html/
